<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>算法学习笔记</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
    <div class="app">
        <!-- 顶部搜索栏 -->
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-toggle" id="menuToggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <a href="home.html" class="site-title" style="text-decoration:none;color:inherit;">算法学习笔记</a>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索算法..." autocomplete="off">
                <div class="search-results" id="searchResults"></div>
            </div>
        </header>

        <div class="main-container">
            <!-- 左侧导航栏 -->
            <aside class="sidebar" id="sidebar">
                <nav class="nav-tree" id="navTree"></nav>
            </aside>

            <!-- 内容区域 -->
            <main class="content" id="content">
                <div class="welcome">
                    <h2>欢迎来到算法学习笔记</h2>
                    <p>左侧导航栏浏览算法分类，顶部搜索框快速查找。</p>
                    <p>点击左侧菜单开始学习吧！</p>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="js/nav-data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
